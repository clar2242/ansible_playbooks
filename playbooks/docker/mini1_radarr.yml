---
- name: install radarr on mini1.srv.3fr.uk
  hosts: mini1.srv.3fr.uk
  gather_facts: false
  tasks:
    - community.docker.docker_container:
        name: radarr
        image: lscr.io/linuxserver/radarr:latest
        pull: true
        hostname: radarr
        restart_policy: always
        networks:
          - name: web
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: "Europe/London"
        volumes:
          - radarr_data:/config
          - /data/media:/data/media
          - /data/download/:/data/download
        labels:
          caddy_0: radarr.home.thunderweb.uk
          caddy_0.redir: https://radarr.svc.3fr.uk{uri}
          caddy_1: radarr.svc.3fr.uk
          caddy_1.import_0: accesslogs
          caddy_1.reverse_proxy: !unsafe "{{ upstreams 7878 }}"
    - name: Create radarr.svc.3fr.uk CNAME
      delegate_to: localhost
      ansible.builtin.uri:
        url: https://dns.srv.3fr.uk/api/zones/records/add
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ dns_token }}"
          domain: radarr.svc.3fr.uk
          type: CNAME
          ttl: 300
          cname: "{{ inventory_hostname }}"
          overwrite: true
        status_code: 200