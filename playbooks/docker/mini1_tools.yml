---
- name: install IT Tools on mini1
  hosts: mini1.srv.3fr.uk
  gather_facts: false
  tasks:
    - community.docker.docker_container:
        name: ittools
        image: ghcr.io/corentinth/it-tools:latest
        pull: true
        hostname: ittools
        restart_policy: always
        networks:
          - name: web
        labels:
          caddy_0: tools.home.thunderweb.uk
          caddy_0.redir: https://tools.svc.3fr.uk{uri}
          caddy_1: tools.svc.3fr.uk
          caddy_1.import_0: accesslogs
          caddy_1.reverse_proxy: !unsafe "{{ upstreams 80 }}"
    - name: Create tools.svc.3fr.uk CNAME
      delegate_to: localhost
      ansible.builtin.uri:
        url: https://dns.srv.3fr.uk/api/zones/records/add
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ dns_token }}"
          domain: tools.svc.3fr.uk
          type: CNAME
          ttl: 300
          cname: "{{ inventory_hostname }}"
          overwrite: true
        status_code: 200