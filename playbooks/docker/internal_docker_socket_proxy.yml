---
- name: install docker socket proxy on dockerinternal hosts
  hosts: dockerinternal
  gather_facts: false
  tasks:
    - community.docker.docker_container:
        name: docker_proxy
        image: ghcr.io/tecnativa/docker-socket-proxy:latest
        pull: true
        restart_policy: always
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock:ro
        env:
          CONTAINERS: "1"
        # Exposed on all interfaces by design: tecnativa/docker-socket-proxy
        # is configured with CONTAINERS=1 only (read-only container listing),
        # all other Docker API endpoints are denied.
        ports:
          - 2375:2375

