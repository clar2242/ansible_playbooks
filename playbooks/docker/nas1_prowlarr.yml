---
- name: install prowlarr on nas1.srv.3fr.uk
  hosts: nas1.srv.3fr.uk
  gather_facts: false
  tasks:
    - name: Create prowlarr.svc.3fr.uk CNAME
      delegate_to: localhost
      ansible.builtin.uri:
        url: https://dns.srv.3fr.uk/api/zones/records/add
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ dns_token }}"
          domain: prowlarr.svc.3fr.uk
          type: CNAME
          ttl: 300
          cname: "{{ inventory_hostname }}"
          overwrite: true
        status_code: 200
