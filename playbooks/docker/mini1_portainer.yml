---
- name: install portainer on mini1
  hosts: mini1.srv.3fr.uk
  gather_facts: false
  tasks:
    - community.docker.docker_container:
        name: portainer
        image: portainer/portainer-ce:latest
        pull: true
        hostname: portainer
        restart_policy: always
        networks:
          - name: web
        volumes:
          - portainer_data:/data
          - /var/run/docker.sock:/var/run/docker.sock
        labels:
          caddy_0: portainer.home.thunderweb.uk
          caddy_0.redir: https://portainer.svc.3fr.uk{uri}
          caddy_1: portainer.svc.3fr.uk
          caddy_1.import_0: accesslogs
          caddy_1.reverse_proxy: !unsafe "{{ upstreams 9000 }}"
    - name: Create portainer.svc.3fr.uk CNAME
      delegate_to: localhost
      ansible.builtin.uri:
        url: https://dns.srv.3fr.uk/api/zones/records/add
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ dns_token }}"
          domain: portainer.svc.3fr.uk
          type: CNAME
          cname: "{{ inventory_hostname }}"
          overwrite: true
        status_code: 200