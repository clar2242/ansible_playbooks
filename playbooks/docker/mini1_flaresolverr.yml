---
- name: install flaresolverr on mini1.srv.3fr.uk
  hosts: mini1.srv.3fr.uk
  gather_facts: false
  tasks:
    - community.docker.docker_container:
        name: flaresolverr
        image: ghcr.io/flaresolverr/flaresolverr:latest
        pull: true
        hostname: flaresolverr
        restart_policy: always
        networks:
          - name: web
        env:
          TZ: "Europe/London"
          LOG_LEVEL: "info"
        labels:
          caddy_1: flaresolverr.svc.3fr.uk
          caddy_1.import_0: accesslogs
          caddy_1.reverse_proxy: !unsafe "{{ upstreams 8191 }}"
    - name: Create flaresolverr.svc.3fr.uk CNAME
      delegate_to: localhost
      ansible.builtin.uri:
        url: https://dns.srv.3fr.uk/api/zones/records/add
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ dns_token }}"
          domain: flaresolverr.svc.3fr.uk
          type: CNAME
          ttl: 3600
          cname: "{{ inventory_hostname }}"
          overwrite: true
        status_code: 200
