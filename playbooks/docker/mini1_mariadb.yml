---
- name: install mariadb on mini1.srv.3fr.uk
  hosts: mini1.srv.3fr.uk
  gather_facts: true
  tasks:
    - no_log: true
      community.docker.docker_container:
        name: mariadb
        image: lscr.io/linuxserver/mariadb:latest
        pull: true
        hostname: mariadb
        restart_policy: always
        networks:
          - name: web
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: "Europe/London"
          MYSQL_ROOT_PASSWORD: "{{ docker1_mysql_root }}"
        volumes:
          - mariadb_data:/config
        ports:
          - "{{ ansible_facts['eno1']['ipv4']['address'] }}:3306:3306"