---
- name: install phpmyadmin on mini1.srv.3fr.uk
  hosts: mini1.srv.3fr.uk
  gather_facts: false
  tasks:
    - community.docker.docker_container:
        name: phpmyadmin
        image: lscr.io/linuxserver/phpmyadmin:latest
        pull: true
        hostname: phpmyadmin
        restart_policy: always
        networks:
          - name: web
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: "Europe/London"
          PMA_ABSOLUTE_URI: "https://phpmyadmin.svc.3fr.uk"
        volumes:
          - phpmyadmin_data:/config
        labels:
          caddy_0: phpymadmin.home.thunderweb.uk
          caddy_0.redir: https://phpmyadmin.svc.3fr.uk{uri}
          caddy_1: phpmyadmin.svc.3fr.uk
          caddy_1.import_0: accesslogs
          caddy_1.reverse_proxy: !unsafe "{{ upstreams 80 }}"
    - name: Create phpmyadmin.svc.3fr.uk CNAME
      delegate_to: localhost
      ansible.builtin.uri:
        url: https://dns.srv.3fr.uk/api/zones/records/add
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ dns_token }}"
          domain: phpmyadmin.svc.3fr.uk
          type: CNAME
          ttl: 300
          cname: "{{ inventory_hostname }}"
          overwrite: true
        status_code: 200