---
- name: install bazarr on mini1.srv.3fr.uk
  hosts: mini1.srv.3fr.uk
  gather_facts: false
  tasks:
    - community.docker.docker_container:
        name: bazarr
        image: lscr.io/linuxserver/bazarr:latest
        pull: true
        hostname: bazarr
        restart_policy: always
        networks:
          - name: web
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: "Europe/London"
        volumes:
          - bazarr_data:/config
          - /data/media:/data/media
          - /data/download/:/data/download
        labels:
          caddy_1: bazarr.svc.3fr.uk
          caddy_1.import_0: accesslogs
          caddy_1.reverse_proxy: !unsafe "{{ upstreams 6767 }}"
    - name: Create bazarr.svc.3fr.uk CNAME
      delegate_to: localhost
      no_log: true
      ansible.builtin.uri:
        url: https://dns.srv.3fr.uk/api/zones/records/add
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ dns_token }}"
          domain: bazarr.svc.3fr.uk
          type: CNAME
          ttl: 3600
          cname: "{{ inventory_hostname }}"
          overwrite: true
        status_code: 200