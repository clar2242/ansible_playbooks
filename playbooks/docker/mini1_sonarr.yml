---
- name: install sonarr on mini1.srv.3fr.uk
  hosts: mini1.srv.3fr.uk
  gather_facts: false
  tasks:
    - community.docker.docker_container:
        name: sonarr
        image: lscr.io/linuxserver/sonarr:latest
        pull: true
        hostname: sonarr
        restart_policy: always
        networks:
          - name: web
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: "Europe/London"
        volumes:
          - sonarr_data:/config
          - /data/media:/data/media
          - /data/download/:/data/download
        labels:
          caddy_0: sonarr.home.thunderweb.uk
          caddy_0.redir: https://sonarr.svc.3fr.uk{uri}
          caddy_1: sonarr.svc.3fr.uk
          caddy_1.import_0: accesslogs
          caddy_1.reverse_proxy: !unsafe "{{ upstreams 8989 }}"
    - name: Create sonarr.svc.3fr.uk CNAME
      delegate_to: localhost
      ansible.builtin.uri:
        url: https://dns.srv.3fr.uk/api/zones/records/add
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ dns_token }}"
          domain: sonarr.svc.3fr.uk
          type: CNAME
          ttl: 3600
          cname: "{{ inventory_hostname }}"
          overwrite: true
        status_code: 200