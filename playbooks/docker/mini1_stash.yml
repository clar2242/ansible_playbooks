---
- name: install stash on mini1
  hosts: mini1.srv.3fr.uk
  gather_facts: false
  tasks:
    - community.docker.docker_container:
        name: stash
        image: ghcr.io/hotio/stash
        pull: true
        hostname: stash
        restart_policy: always
        networks:
          - name: web
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: "Europe/London"
          UMASK: "002"
        volumes:
          - /data/shared/_Sort:/data/shared/_Sort
          - /data/shared/_Sort/stash_data:/config
        labels:
          caddy_0: stash.home.thunderweb.uk
          caddy_0.redir: https://stash.svc.3fr.uk{uri}
          caddy_1: stash.svc.3fr.uk
          caddy_1.import_0: httpauth_3fr
          caddy_1.import_1: accesslogs
          caddy_1.reverse_proxy: !unsafe "{{ upstreams 9999 }}"
    - name: Create stash.svc.3fr.uk CNAME
      delegate_to: localhost
      ansible.builtin.uri:
        url: https://dns.srv.3fr.uk/api/zones/records/add
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ dns_token }}"
          domain: stash.svc.3fr.uk
          type: CNAME
          ttl: 3600
          cname: "{{ inventory_hostname }}"
          overwrite: true
        status_code: 200