---
- name: update docker compose stacks on mini1 (svc.3fr.uk)
  hosts: mini1.srv.3fr.uk
  gather_facts: false
  vars: 
    stack_name:
      - audiobookshelf
      - auth
      - autobrr
      - dawarich
      - dockhand
      - domainlocker
      # - glkvm
      - homelable
      - ipam
      - iplayarr
      - karakeep
      - navidrome
      - paperless
      - photon
      - pulse
      - qui
      - repo
      - romm
      # - semaphore
      - shelfmark
      - sparkyfitness
      - ssh
      - toolkit
      - tracearr
      - wrapperr
      - yamtrack
      - youtarr

  tasks:
    - name: pull latest containers on mini1
      ansible.builtin.command: 
        cmd: docker compose pull
        chdir: /home/scott/docker/{{ item }}
      loop: "{{ stack_name }}"
    - name: restart containers
      ansible.builtin.command: 
        cmd: docker compose up -d
        chdir: /home/scott/docker/{{ item }}
      loop: "{{ stack_name }}"
    - name: "Create CNAMEs"
      delegate_to: localhost
      loop: "{{ stack_name }}"
      no_log: true
      ansible.builtin.uri:
        url: https://dns.srv.3fr.uk/api/zones/records/add
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ dns_token }}"
          domain: "{{ item }}.svc.3fr.uk"
          type: CNAME
          ttl: 3600
          cname: "{{ inventory_hostname }}"
          overwrite: true
        status_code: 200
