---

- name: update all linux boxes
  hosts: linuxboxes
  gather_facts: true
  tasks:
  - name: Update all packages to their latest version
    ansible.builtin.apt:
      clean: yes
      update_cache: yes
      autoremove: yes
      name: "*"
      state: latest
    when: ansible_facts['os_family'] == "Debian"
    become: true
    become_exe: "{{ 'sudo.ws' if ansible_facts.packages['sudo-rs'] is defined else 'sudo' }}. 

  - name: Update all non Debian machine packages to latest version    
    package:
      name: "*"
      state: latest
    when: ansible_facts['os_family'] != "Debian"

