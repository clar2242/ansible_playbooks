---

- name: update all linux boxes
  hosts: linuxboxes
  become: true
  gather_facts: true
  serial: 1
  tasks:
  - name: Update all packages to their latest version
    ansible.builtin.apt:
      clean: yes
      update_cache: yes
      autoremove: yes
      name: "*"
      state: latest
    when: ansible_facts['os_family'] == "Debian"

  - name: Update all non Debian machine packages to latest version
    package:
      name: "*"
      state: latest
    when: ansible_facts['os_family'] != "Debian"

  - name: Check if reboot is required (Debian)
    ansible.builtin.stat:
      path: /var/run/reboot-required
    register: reboot_required_deb
    when: ansible_facts['os_family'] == "Debian"

  - name: Check if reboot is required (RHEL)
    ansible.builtin.command: dnf needs-restarting -r
    register: reboot_required_rhel
    failed_when: false
    changed_when: false
    when: ansible_facts['os_family'] == "RedHat"

  - name: Reboot if required
    ansible.builtin.reboot:
      msg: "Rebooting after package updates"
      reboot_timeout: 600
      post_reboot_delay: 30
      test_command: whoami
    when:
      - inventory_hostname not in groups['proxmox']
      - inventory_hostname != 'nas1.srv.3fr.uk'
      - (ansible_facts['os_family'] == "Debian" and reboot_required_deb.stat.exists | default(false))
        or
        (ansible_facts['os_family'] == "RedHat" and reboot_required_rhel.rc | default(0) == 1)

